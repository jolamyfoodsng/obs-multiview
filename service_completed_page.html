<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sunday Switcher - Service Completed</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981","primary-hover": "#059669",
                        "background-dark": "#18181b","surface-dark": "#27272a","surface-lighter": "#3f3f46",},
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                    },
                },
            },
        }
    </script>
<style>
        .backdrop-blur-custom {
            backdrop-filter: blur(12px);
            background-color: rgba(0, 0, 0, 0.85);
        }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 min-h-screen flex flex-col">
<div class="fixed inset-0 overflow-hidden pointer-events-none filter blur-md opacity-20">
<header class="h-16 border-b border-zinc-800 flex items-center px-8 bg-zinc-900">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded"></div>
<span class="font-bold text-xl tracking-tight text-white">Sunday Switcher</span>
</div>
</header>
<main class="p-8 grid grid-cols-12 gap-6">
<div class="col-span-3 h-64 bg-zinc-800 rounded"></div>
<div class="col-span-9 h-64 bg-zinc-800 rounded"></div>
<div class="col-span-12 h-96 bg-zinc-800 rounded"></div>
</main>
</div>
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-custom">
<div class="bg-surface-dark w-full max-w-[520px] rounded-2xl shadow-2xl overflow-hidden border border-zinc-700/50 flex flex-col items-center text-center">
<div class="pt-12 pb-6 px-8 flex flex-col items-center">
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6 ring-1 ring-primary/20">
<span class="material-symbols-outlined text-primary text-5xl">check_circle</span>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight mb-2">Service Completed</h1>
<p class="text-zinc-400 font-medium">Great job! Here is a summary of today's service.</p>
</div>
<div class="w-full px-8 mb-8">
<div class="bg-zinc-900/50 rounded-xl border border-zinc-800/80 p-6">
<div class="grid grid-cols-1 gap-6">
<div class="flex items-center justify-between border-b border-zinc-800 pb-4 last:border-0 last:pb-0">
<div class="flex items-center gap-3">
<div class="p-2 bg-zinc-800 rounded-lg text-zinc-400">
<span class="material-symbols-outlined text-xl">schedule</span>
</div>
<span class="text-zinc-300 font-medium">Total Duration</span>
</div>
<span class="text-white font-bold text-lg">1h 45m</span>
</div>
<div class="flex items-center justify-between border-b border-zinc-800 pb-4 last:border-0 last:pb-0">
<div class="flex items-center gap-3">
<div class="p-2 bg-zinc-800 rounded-lg text-zinc-400">
<span class="material-symbols-outlined text-xl">menu_book</span>
</div>
<span class="text-zinc-300 font-medium">Bible Verses Displayed</span>
</div>
<span class="text-white font-bold text-lg">12</span>
</div>
<div class="flex items-center justify-between border-b border-zinc-800 pb-4 last:border-0 last:pb-0">
<div class="flex items-center gap-3">
<div class="p-2 bg-zinc-800 rounded-lg text-zinc-400">
<span class="material-symbols-outlined text-xl">library_music</span>
</div>
<span class="text-zinc-300 font-medium">Songs Used</span>
</div>
<span class="text-white font-bold text-lg">5</span>
</div>
</div>
</div>
</div>
<div class="w-full px-8 pb-10 flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary-hover text-zinc-900 font-bold py-3.5 rounded-lg text-lg shadow-lg shadow-primary/10 transition-all flex items-center justify-center gap-2 transform active:scale-[0.99]">
<span class="material-symbols-outlined">add_circle</span>
                Start New Service
            </button>
<button class="w-full bg-transparent hover:bg-zinc-800 text-zinc-400 hover:text-white font-medium py-3.5 rounded-lg text-lg border border-zinc-700 hover:border-zinc-600 transition-all flex items-center justify-center gap-2 transform active:scale-[0.99]">
                Return to Dashboard
            </button>
</div>
</div>
</div>

</body></html>
