<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#1f212a",
                        "surface-dark": "#2a2d3a",
                        "surface-hover": "#363a4a",
                        "danger": "#dc2626",
                        "success": "#22c55e",
                        "warning": "#eab308"

                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.375rem", "xl": "0.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f212a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b4f6b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #636888;
        }

<button class="h-12 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-sm rounded shadow-lg shadow-emerald-900/20 active:translate-y-0.5 transition-all flex items-center justify-center gap-2">
