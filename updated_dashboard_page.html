</div>

<div>

</button>
<button class="bg-surface-dark/40 border border-white/5 rounded-xl p-5 hover:bg-surface-dark/80 hover:border-white/20 transition-all group text-left flex items-start gap-4">

</div>
<div>
<h4 class="font-medium text-white mb-1">Start Song</h4>
<p class="text-xs text-muted leading-relaxed">Launch lyric presentation for worship.</p>

</button>
<button class="bg-surface-dark/40 border border-white/5 rounded-xl p-5 hover:bg-surface-dark/80 hover:border-white/20 transition-all group text-left flex items-start gap-4">
