<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>Bible Overlay — Fullscreen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('/fonts/cmg-sans-fonts.css');

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: var(--font-family, "CMG Sans", sans-serif);
  }

  /* Background layer — STATIC, never animates */
  #background {
    position: absolute;
    inset: 0;
    background-color: var(--bg-color, transparent);
    background-image: var(--bg-image, none);
    background-size: cover;
    background-position: center;
    opacity: var(--bg-opacity, 1);
    z-index: 0;
    transition: opacity var(--anim-duration, 400ms) ease;
  }

  /* Soft readability shade above BG and below text */
  #background-shade {
    position: absolute;
    inset: 0;
    background-image: var(--bg-shade-gradient, linear-gradient(180deg, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.42) 100%));
    z-index: 1;
    pointer-events: none;
    display: var(--bg-shade-display, none);
    opacity: 1;
    transition: opacity var(--anim-duration, 400ms) ease;
  }

  /* Content layer — this is what transitions */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
    transition: opacity var(--anim-duration, 400ms) ease;
  }

  #overlay.hidden {
    opacity: 0;
  }

  #overlay.blank {
    opacity: 0;
  }

  #content {
    position: relative;
    z-index: 1;
    max-width: calc(100% - var(--safe-area, 80px) * 2);
    padding: var(--padding, 60px);
    text-align: var(--text-align, center);
  }

  #verse-text {
    font-size: var(--font-size, 48px);
    font-weight: var(--font-weight, normal);
    color: var(--font-color, #FFFFFF);
    line-height: var(--line-height, 1.6);
    text-shadow: var(--text-shadow, 0 2px 8px rgba(0,0,0,0.6));
    -webkit-text-stroke: var(--outline-width, 0px) var(--outline-color, transparent);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
    text-transform: var(--text-transform, none);
  }

  #reference {
    margin-top: 24px;
    font-size: var(--ref-font-size, 24px);
    font-weight: var(--ref-font-weight, normal);
    color: var(--ref-font-color, #cccccc);
  }

  #reference.top { order: -1; margin-top: 0; margin-bottom: 24px; }

  #logo {
    position: absolute;
    z-index: 1;
    width: var(--logo-size, 80px);
    height: auto;
    opacity: 0.8;
    display: none;
  }
  #logo.visible { display: block; }
  #logo.top-left { top: 20px; left: 20px; }
  #logo.top-right { top: 20px; right: 20px; }
  #logo.bottom-left { bottom: 20px; left: 20px; }
  #logo.bottom-right { bottom: 20px; right: 20px; }

  #slide-counter {
    position: absolute;
    z-index: 1;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    font-family: "CMG Sans", sans-serif;
  }

  /* Animations */
  .anim-fade-enter {
    animation: fadeIn var(--anim-duration, 400ms) ease forwards;
  }
  .anim-slide-up-enter {
    animation: slideUp var(--anim-duration, 400ms) ease forwards;
  }
  .anim-slide-left-enter {
    animation: slideLeft var(--anim-duration, 400ms) ease forwards;
  }
  .anim-scale-in-enter {
    animation: scaleIn var(--anim-duration, 400ms) ease forwards;
  }
  .anim-text-delayed-enter {
    opacity: 0;
    animation: delayedText var(--text-enter-duration, 320ms) ease var(--text-enter-delay, 120ms) forwards;
  }
  .anim-shade-enter {
    animation: revealShade var(--bg-enter-duration, 220ms) ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideLeft {
    from { opacity: 0; transform: translateX(60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes delayedText {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes revealShade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>
<div id="background"></div>
<div id="background-shade"></div>
<div id="overlay" class="hidden">
  <div id="content">
    <div id="verse-text"></div>
    <div id="reference"></div>
  </div>
  <img id="logo" src="" alt="">
  <div id="slide-counter"></div>
</div>

<script>
  /**
   * Bible Overlay — Fullscreen
   *
   * Data delivery (in priority order):
   * 1. CSS custom property --overlay-data  (injected by bibleObsService via OBS SetInputSettings)
   * 2. BroadcastChannel  (same-origin popup windows)
   * 3. localStorage polling  (fallback for same-origin contexts)
   *
   * No external WebSocket / HTTP server required.
   */

  const POLL_INTERVAL = 100;
  const FONT_SIZE_MIN = 14;
  const REF_FONT_SIZE_MIN = 10;
  const CONTENT_PADDING_MIN = 18;

  const overlay = document.getElementById('overlay');
  const background = document.getElementById('background');
  const backgroundShade = document.getElementById('background-shade');
  const content = document.getElementById('content');
  const verseText = document.getElementById('verse-text');
  const reference = document.getElementById('reference');
  const logo = document.getElementById('logo');
  const slideCounter = document.getElementById('slide-counter');

  let currentSlideId = null;
  let lastTimestamp = 0;
  let hasShownOnce = false;  // Track first show vs subsequent verse changes
  let baseFontSize = 48;
  let baseRefFontSize = 24;
  let basePadding = 60;
  let lastCssOverlayData = '';

  function clamp01(value, fallback) {
    const n = Number(value);
    if (!Number.isFinite(n)) return fallback;
    return Math.max(0, Math.min(1, n));
  }

  function parseColorToRgb(color) {
    const raw = String(color || "").trim();
    if (!raw) return { r: 0, g: 0, b: 0 };

    if (raw[0] === "#") {
      const hex = raw.slice(1);
      if (hex.length === 3) {
        const r = parseInt(hex[0] + hex[0], 16);
        const g = parseInt(hex[1] + hex[1], 16);
        const b = parseInt(hex[2] + hex[2], 16);
        if (Number.isFinite(r) && Number.isFinite(g) && Number.isFinite(b)) return { r, g, b };
      } else if (hex.length >= 6) {
        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);
        if (Number.isFinite(r) && Number.isFinite(g) && Number.isFinite(b)) return { r, g, b };
      }
    }

    const rgbMatch = raw.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)/i);
    if (rgbMatch) {
      const r = Math.max(0, Math.min(255, Number(rgbMatch[1])));
      const g = Math.max(0, Math.min(255, Number(rgbMatch[2])));
      const b = Math.max(0, Math.min(255, Number(rgbMatch[3])));
      if (Number.isFinite(r) && Number.isFinite(g) && Number.isFinite(b)) return { r, g, b };
    }

    return { r: 0, g: 0, b: 0 };
  }

  function buildShadeGradient(color, opacity) {
    const o = clamp01(opacity, 0.42);
    const topOpacity = clamp01(o * 0.62, 0.26);
    const bottomOpacity = o;
    const { r, g, b } = parseColorToRgb(color);
    return `linear-gradient(180deg, rgba(${r}, ${g}, ${b}, ${topOpacity}) 0%, rgba(${r}, ${g}, ${b}, ${bottomOpacity}) 100%)`;
  }

  function ensureCmgSansFont(fontFamily) {
    const raw = String(fontFamily || "").trim();
    return /cmg\s*sans/i.test(raw) ? raw : '"CMG Sans", sans-serif';
  }

  function toCssFontWeight(weight, fallback) {
    if (weight === "light") return "300";
    if (weight === "bold") return "700";
    if (weight === "normal") return "400";
    const asString = String(weight || "").trim();
    if (/^\d{3}$/.test(asString)) return asString;
    return fallback;
  }

  function applyTheme(theme) {
    if (!theme) return;
    const s = theme;
    const root = document.documentElement.style;

    root.setProperty('--font-family', ensureCmgSansFont(s.fontFamily));
    baseFontSize = Number(s.fontSize || 48);
    baseRefFontSize = Number(s.refFontSize || 24);
    root.setProperty('--font-size', baseFontSize + 'px');
    root.setProperty('--font-weight', toCssFontWeight(s.fontWeight, "400"));
    root.setProperty('--font-color', s.fontColor || '#FFFFFF');
    root.setProperty('--line-height', String(s.lineHeight || 1.6));
    root.setProperty('--text-align', s.textAlign || 'center');
    root.setProperty('--text-shadow', s.textShadow || 'none');
    root.setProperty('--outline-width', s.textOutline ? (s.textOutlineWidth || 2) + 'px' : '0px');
    root.setProperty('--outline-color', s.textOutline ? (s.textOutlineColor || '#000') : 'transparent');

    root.setProperty('--ref-font-size', baseRefFontSize + 'px');
    root.setProperty('--ref-font-weight', toCssFontWeight(s.refFontWeight, "400"));
    root.setProperty('--ref-font-color', s.refFontColor || '#cccccc');

    root.setProperty('--bg-color', s.backgroundColor || 'transparent');
    root.setProperty('--bg-opacity', String(s.backgroundOpacity ?? 1));
    root.setProperty(
      '--bg-shade-gradient',
      buildShadeGradient(
        s.fullscreenShadeColor || '#000000',
        s.fullscreenShadeOpacity ?? 0.42
      )
    );
    root.setProperty('--bg-shade-display', s.fullscreenShadeEnabled === false ? 'none' : 'block');
    basePadding = Number(s.padding || 60);
    root.setProperty('--padding', basePadding + 'px');
    root.setProperty('--safe-area', (s.safeArea || 40) + 'px');
    const effectiveAnimDuration = Math.max(95, Math.min(170, Math.round((s.animationDuration || 400) * 0.38)));
    root.setProperty('--anim-duration', effectiveAnimDuration + 'ms');
    root.setProperty('--bg-enter-duration', Math.max(70, Math.round(effectiveAnimDuration * 0.42)) + 'ms');
    root.setProperty('--text-enter-duration', Math.max(82, Math.round(effectiveAnimDuration * 0.54)) + 'ms');
    root.setProperty('--text-enter-delay', Math.max(12, Math.round(effectiveAnimDuration * 0.08)) + 'ms');

    // Text transform
    root.setProperty('--text-transform', s.textTransform || 'none');

    if (s.backgroundImage) {
      let bgUrl = s.backgroundImage;
      if (bgUrl === '__BG_SOURCE__') {
        // Background image is handled by a separate OBS image_source
        // behind this browser source — keep the #background div transparent
        root.setProperty('--bg-image', 'none');
        root.setProperty('--bg-color', 'transparent');
        root.setProperty('--bg-opacity', '1');
      } else if (bgUrl === '__FROM_CSS__') {
        const cssVal = getComputedStyle(document.documentElement).getPropertyValue('--bg-image').trim();
        root.setProperty('--bg-image', cssVal || 'none');
        if (cssVal) {
          root.setProperty('--bg-color', 'transparent');
          root.setProperty('--bg-opacity', String(s.backgroundOpacity ?? 1));
        }
      } else if (bgUrl === '__FROM_LOCALSTORAGE__') {
        // Legacy: read from localStorage (same-origin popup preview)
        const stored = localStorage.getItem('bible-overlay-bg-image');
        bgUrl = stored || '';
        root.setProperty('--bg-image', bgUrl ? `url(${bgUrl})` : 'none');
      } else {
        root.setProperty('--bg-image', `url(${bgUrl})`);
      }
    } else {
      root.setProperty('--bg-image', 'none');
    }

    if (s.refPosition === 'top') {
      reference.classList.add('top');
    } else {
      reference.classList.remove('top');
    }

    if (s.logoUrl) {
      if (s.logoUrl === '__FROM_CSS__') {
        // Logo data URI was stripped from the URL hash to stay within OBS
        // URL limits — read it from the CSS custom property injected via
        // OBS SetInputSettings { css: ":root { --logo-data-uri: url(...) }" }
        const cssVal = getComputedStyle(document.documentElement).getPropertyValue('--logo-data-uri').trim();
        if (cssVal && cssVal.startsWith('url(')) {
          // Extract the data URI from url(...)
          const inner = cssVal.slice(4, -1).replace(/^["']|["']$/g, '');
          logo.src = inner;
        }
      } else {
        logo.src = s.logoUrl;
      }
      logo.className = 'visible ' + (s.logoPosition || 'bottom-right');
      root.setProperty('--logo-size', (s.logoSize || 80) + 'px');
    } else {
      logo.className = '';
    }
  }

  function autoScaleContent() {
    if (!content) return;

    // Reset to base theme sizes first
    let verseSize = Math.max(FONT_SIZE_MIN, Math.round(baseFontSize));
    let refSize = Math.max(REF_FONT_SIZE_MIN, Math.round(baseRefFontSize));
    let padding = Math.max(CONTENT_PADDING_MIN, Math.round(basePadding));
    verseText.style.fontSize = verseSize + "px";
    reference.style.fontSize = refSize + "px";
    content.style.padding = padding + "px";

    const safeAreaRaw = getComputedStyle(document.documentElement)
      .getPropertyValue("--safe-area")
      .trim()
      .replace("px", "");
    const safeArea = Number(safeAreaRaw) || 40;
    const viewportHeight = document.body?.clientHeight || 1080;
    const targetHeight = Math.max(260, viewportHeight - (safeArea * 2));
    const ratio = baseFontSize > 0 ? (baseRefFontSize / baseFontSize) : 0.5;

    while (content.scrollHeight > targetHeight && (verseSize > FONT_SIZE_MIN || refSize > REF_FONT_SIZE_MIN || padding > CONTENT_PADDING_MIN)) {
      if (verseSize > FONT_SIZE_MIN) {
        verseSize -= 1;
      }
      refSize = Math.max(REF_FONT_SIZE_MIN, Math.round(verseSize * ratio));
      if (content.scrollHeight > targetHeight && padding > CONTENT_PADDING_MIN) {
        padding = Math.max(CONTENT_PADDING_MIN, padding - 2);
      }
      verseText.style.fontSize = verseSize + "px";
      reference.style.fontSize = refSize + "px";
      content.style.padding = padding + "px";
    }
  }

  function clearEntranceAnimationClasses() {
    content.classList.remove('anim-fade-enter', 'anim-slide-up-enter', 'anim-slide-left-enter', 'anim-scale-in-enter');
    verseText.classList.remove('anim-text-delayed-enter');
    reference.classList.remove('anim-text-delayed-enter');
    if (backgroundShade) backgroundShade.classList.remove('anim-shade-enter');
  }

  function runEntranceAnimation(anim) {
    clearEntranceAnimationClasses();
    void content.offsetWidth;

    if (anim === 'none') return;

    if (anim === 'reveal-bg-then-text') {
      if (backgroundShade) backgroundShade.classList.add('anim-shade-enter');
      verseText.classList.add('anim-text-delayed-enter');
      reference.classList.add('anim-text-delayed-enter');
      return;
    }

    if (anim === 'fade') {
      content.classList.add('anim-fade-enter');
      return;
    }

    if (anim === 'slide-up') {
      content.classList.add('anim-slide-up-enter');
      return;
    }

    if (anim === 'scale-in') {
      content.classList.add('anim-scale-in-enter');
      return;
    }

    content.classList.add('anim-slide-left-enter');
  }

  function applySlide(data) {
    if (!data) return;
    // De-duplicate by timestamp
    if (data.timestamp && data.timestamp <= lastTimestamp) return;
    lastTimestamp = data.timestamp || 0;

    if (!data.slide) {
      overlay.classList.add('hidden');
      currentSlideId = null;
      hasShownOnce = false;  // Reset so next appearance animates
      return;
    }

    const slide = data.slide;
    const isNew = slide.id !== currentSlideId;
    currentSlideId = slide.id;

    if (data.theme) {
      applyTheme(data.theme);
    }

    if (data.blanked) {
      overlay.classList.add('blank');
      return;
    } else {
      overlay.classList.remove('blank');
    }

    // Always show the overlay when we have a slide — the dock/app controls
    // visibility via OBS scene item enabled state, not via this flag.
    overlay.classList.remove('hidden');

    const displayText = slide.text.replace(/\[(\d+)\]\s*/g, '<sup>$1</sup> ');
    verseText.innerHTML = displayText;
    const referenceText = typeof slide.reference === "string" ? slide.reference.trim() : "";
    reference.textContent = referenceText;
    reference.style.display = referenceText ? "block" : "none";
    autoScaleContent();
    if (slideCounter) {
      slideCounter.textContent = `${slide.index + 1} / ${slide.total}`;
    }

    if (isNew) {
      // Only animate on FIRST show (overlay appearing).
      // Subsequent verse changes just update text — no re-animation.
      if (!hasShownOnce) {
        hasShownOnce = true;
        const anim = data.theme?.animation || 'fade';
        runEntranceAnimation(anim);
      }
    }
  }

  function readFromCssVar() {
    try {
      const raw = getComputedStyle(document.documentElement).getPropertyValue('--overlay-data').trim();
      if (!raw || raw === lastCssOverlayData) return false;
      lastCssOverlayData = raw;
      const normalized = raw.replace(/^['"]|['"]$/g, '');
      if (!normalized) return false;
      const data = JSON.parse(decodeURIComponent(normalized));
      applySlide(data);
      return true;
    } catch { /* parse error */ }
    return false;
  }

  // --- Method 1: Read from URL hash (OBS updates URL via SetInputSettings) ---
  function readFromUrlHash() {
    try {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#data=')) {
        const encoded = hash.slice(6);
        const data = JSON.parse(decodeURIComponent(encoded));
        applySlide(data);
        return true;
      }
    } catch { /* parse error */ }
    return false;
  }

  // --- Method 2: BroadcastChannel (same-origin windows) ---
  try {
    const bc = new BroadcastChannel('obs-church-studio-bible-overlay');
    bc.onmessage = (e) => { applySlide(e.data); };
  } catch { /* not supported */ }

  // --- Method 3: localStorage polling (same-origin fallback) ---
  function readFromLocalStorage() {
    try {
      const raw = localStorage.getItem('bible-overlay-data');
      if (raw) {
        const data = JSON.parse(raw);
        applySlide(data);
        return true;
      }
    } catch { /* parse error */ }
    return false;
  }

  // --- hashchange listener: OBS updates the URL hash without reloading ---
  // This is the primary update path. When bibleObsService calls SetInputSettings
  // with only the hash fragment changed, OBS/CEF fires hashchange instead of
  // reloading the page. The background stays static and only text updates.
  window.addEventListener('hashchange', () => {
    readFromUrlHash();
  });

  // --- Unified polling loop ---
  setInterval(() => {
    if (!readFromCssVar() && !readFromUrlHash()) {
      readFromLocalStorage();
    }
  }, POLL_INTERVAL);

  // Initial read
  readFromCssVar() || readFromUrlHash() || readFromLocalStorage();
</script>
</body>
</html>
