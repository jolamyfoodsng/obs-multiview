<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Church Studio Live Tool</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: "Google Sans", "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
    }

    .live-tool {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      isolation: isolate;
      background: var(--tool-bg, #111827);
    }

    .live-tool__media,
    .live-tool__video {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .live-tool::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.52));
    }

    .live-tool__card {
      width: min(1280px, calc(100vw - 160px));
      text-align: center;
      animation: enter 360ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .live-tool__eyebrow {
      margin-bottom: 28px;
      font-size: clamp(22px, 2.2vw, 42px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.76;
    }

    .live-tool__title {
      font-size: clamp(62px, 7vw, 150px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: -0.045em;
      text-wrap: balance;
      text-shadow: 0 16px 60px rgba(0, 0, 0, 0.42);
    }

    .live-tool__subtitle,
    .live-tool__body {
      margin: 28px auto 0;
      max-width: 980px;
      font-size: clamp(28px, 3.2vw, 64px);
      font-weight: 650;
      line-height: 1.14;
      opacity: 0.92;
      text-wrap: balance;
    }

    .live-tool__body {
      max-width: 860px;
      font-size: clamp(24px, 2.4vw, 46px);
      font-weight: 520;
      opacity: 0.82;
    }

    .live-tool__cta {
      display: inline-flex;
      margin-top: 48px;
      border: 2px solid rgba(255, 255, 255, 0.42);
      border-radius: 6px;
      padding: 18px 30px;
      font-size: clamp(22px, 2vw, 38px);
      font-weight: 800;
      letter-spacing: 0.03em;
      background: rgba(0, 0, 0, 0.24);
    }

    .live-tool--countdown .live-tool__title {
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .live-tool--lower-third {
      place-items: end start;
      padding: 0 0 90px 90px;
      background: transparent;
    }

    .live-tool--lower-third::after {
      display: none;
    }

    .live-tool--lower-third .live-tool__card {
      width: min(860px, calc(100vw - 180px));
      border-left: 8px solid rgba(255, 255, 255, 0.88);
      border-radius: 6px;
      padding: 34px 42px;
      text-align: left;
      background: color-mix(in srgb, var(--tool-bg, #111827), rgba(0, 0, 0, 0.45) 45%);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.38);
    }

    .live-tool--lower-third .live-tool__eyebrow {
      display: none;
    }

    .live-tool--lower-third .live-tool__title {
      font-size: clamp(44px, 4.2vw, 82px);
    }

    .live-tool--lower-third .live-tool__subtitle {
      margin-top: 12px;
      font-size: clamp(24px, 2.4vw, 44px);
      opacity: 0.78;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <main id="root" class="live-tool">
    <section class="live-tool__card">
      <div id="eyebrow" class="live-tool__eyebrow"></div>
      <h1 id="title" class="live-tool__title"></h1>
      <p id="subtitle" class="live-tool__subtitle"></p>
      <p id="body" class="live-tool__body"></p>
      <div id="cta" class="live-tool__cta"></div>
    </section>
  </main>

  <script>
    const root = document.getElementById("root");
    const eyebrow = document.getElementById("eyebrow");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const body = document.getElementById("body");
    const cta = document.getElementById("cta");
    let countdownTimer = null;

    function parsePayload() {
      try {
        const hash = window.location.hash || "";
        const marker = "#data=";
        if (!hash.startsWith(marker)) return null;
        return JSON.parse(decodeURIComponent(hash.slice(marker.length)));
      } catch {
        return null;
      }
    }

    function setText(node, value) {
      const text = String(value || "").trim();
      node.textContent = text;
      node.style.display = text ? "" : "none";
    }

    function formatTime(totalSeconds) {
      const safe = Math.max(0, Math.floor(Number(totalSeconds) || 0));
      const minutes = Math.floor(safe / 60).toString().padStart(2, "0");
      const seconds = (safe % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function applyBackground(payload) {
      root.style.setProperty("--tool-bg", payload.backgroundColor || "#111827");
      root.querySelectorAll(".live-tool__media, .live-tool__video").forEach((node) => node.remove());

      const mediaUrl = String(payload.backgroundMediaUrl || "").trim();
      if (!mediaUrl) return;

      const ext = mediaUrl.split("?")[0].split("#")[0].split(".").pop().toLowerCase();
      const isVideo = ["mp4", "webm", "mov", "m4v"].includes(ext);
      const node = document.createElement(isVideo ? "video" : "img");
      node.className = isVideo ? "live-tool__video" : "live-tool__media";
      if (isVideo) {
        node.autoplay = true;
        node.loop = true;
        node.muted = true;
        node.playsInline = true;
      }
      node.src = mediaUrl;
      root.prepend(node);
    }

    function render() {
      const payload = parsePayload() || {
        kind: "fullscreen",
        label: "Live Tools",
        title: "Ready",
        subtitle: "",
        backgroundColor: "#111827",
      };

      if (countdownTimer) {
        window.clearInterval(countdownTimer);
        countdownTimer = null;
      }

      root.className = "live-tool";
      if (payload.kind === "countdown") root.classList.add("live-tool--countdown");
      if (payload.lowerThird || payload.kind === "lower-third") root.classList.add("live-tool--lower-third");

      applyBackground(payload);
      setText(eyebrow, payload.label);
      setText(subtitle, payload.subtitle);
      setText(body, payload.body);
      setText(cta, payload.cta);

      if (payload.kind === "countdown") {
        const startedAt = Date.now();
        const duration = Number(payload.durationSeconds) || 300;
        const tick = () => {
          const elapsed = Math.floor((Date.now() - startedAt) / 1000);
          title.textContent = formatTime(duration - elapsed);
        };
        tick();
        countdownTimer = window.setInterval(tick, 250);
      } else {
        setText(title, payload.title);
      }
    }

    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
