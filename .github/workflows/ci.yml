name: CI — Build Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── 1) Quick frontend typecheck (fast, ~30s) ──
  typecheck:
    name: Typecheck + Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

  # ── 2) Full Windows build (catches Rust + Tauri issues) ──
  build-windows:
    name: Build Windows Installer
    needs: typecheck
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache local LLM model
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/models/llm/qwen2.5-1.5b-instruct-q4_k_m.gguf
          key: local-llm-${{ runner.os }}-qwen2.5-1.5b-instruct-q4-k-m-6a1a2e

      - name: Install dependencies
        run: npm install

      - name: Prepare bundled local LLM model
        run: npm run sync:local-llm-model

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: obs-church-studio-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
