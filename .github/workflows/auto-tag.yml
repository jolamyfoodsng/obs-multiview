name: Auto-Tag on Version Bump

# ─────────────────────────────────────────────────────────────────────────────
# Automatically creates a git tag (e.g. v0.24.0) when package.json version
# changes on the main branch, then triggers the release workflow.
#
# NOTE: Tags pushed by github-actions[bot] do NOT trigger other workflows
# (GitHub security measure), so we explicitly call release.yml via
# workflow_dispatch after creating the tag.
#
# Flow:
#   1. You bump the version locally:  npm run version:patch  (or :minor / :major)
#   2. Commit & push to main
#   3. This workflow detects the new version, creates a git tag
#   4. Then triggers release.yml via workflow_dispatch with the version
#   5. release.yml builds + publishes a GitHub Release with installers
#
# This eliminates the need to manually run  git tag vX.Y.Z &&Controls the Bible interface colour scheme. "System" follows your OS preference. git push origin vX.Y.Z
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write
  actions: write # needed to trigger workflow_dispatch

jobs:
  auto-tag:
    name: Create version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can check existing tags

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "📦 package.json version: ${VERSION}  →  tag: ${TAG}"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Tag ${{ steps.version.outputs.tag }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} does not exist — will create"
          fi
      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "✅ Created and pushed tag ${{ steps.version.outputs.tag }}"

      - name: Trigger release workflow
        if: steps.check.outputs.exists == 'false'
        run: |
          gh workflow run "Release — Build & Publish" \
            --field version="${{ steps.version.outputs.tag }}"
          echo "🚀 Triggered release workflow for ${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
